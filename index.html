<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Dicee</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster"
      rel="stylesheet"
    />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Roll the Dice!</h1>

      <div class="dice">
        <p>Player 1</p>
        <img class="img1" src="" />
      </div>

      <div class="dice">
        <p>Player 2</p>
        <img class="img2" src="" />
      </div>
    </div>
    <div>
      <button class="btnRollDice" onclick="playTheGame()">Roll Dice</button>
      <button class="btnChangeLanguage" onclick="changeLanguage()">
        Change Language
      </button>
    </div>
    <audio
      id="audio"
      src="/audio/Lukrembo_Jay.mp3"
      type="audio/mpeg"
      loop
    ></audio>

    <footer>www 🎲 App Brewery 🎲 com</footer>
  </body>
</html>
